plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zvk.webviewsmoke'
    compileSdk 34

    defaultConfig {
        applicationId "com.zvkdis.zivkord"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false   // tiny app, no obfuscation needed; keeps WebView/JS intact
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
