<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZiVKord logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5865F2"/>
      <stop offset="0.55" stop-color="#7A5CFF"/>
      <stop offset="1" stop-color="#9B4DFF"/>
    </linearGradient>
    <linearGradient id="shield" x1="256" y1="96" x2="256" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6E9FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1a1033" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- app tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#glow)"/>

  <!-- security shield -->
  <path filter="url(#soft)" d="M256 96l128 44v112c0 86-54 150-128 184-74-34-128-98-128-184V140l128-44z" fill="url(#shield)"/>

  <!-- bold Z carved into the shield -->
  <path d="M206 196h100c8 0 12 9 7 15l-77 96h63c6 0 11 5 11 11s-5 11-11 11H198c-8 0-12-9-7-15l77-96h-62c-6 0-11-5-11-11s5-11 11-11z" fill="#5865F2"/>

  <!-- cleaning sparkles -->
  <path d="M338 168l6 16 16 6-16 6-6 16-6-16-16-6 16-6 6-16z" fill="#FFD36E"/>
  <circle cx="178" cy="232" r="7" fill="#7A5CFF"/>
  <circle cx="330" cy="300" r="5" fill="#9B4DFF"/>
</svg>
